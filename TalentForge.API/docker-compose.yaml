services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      retries: 10
      start_period: 20s

  redis:  
    image: redis
    ports:
      - "6379:6379"

  app:
    build: .
    depends_on:
      sql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sql,1433;Database=TalentForgeDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      Redis__Configuration: "redis:6379"
      Ollama__BaseUrl: "http://host.docker.internal:11434"
    ports:
      - "8080:8080"
    volumes:
      - resumes-data:/app/Uploads/Resumes

volumes:
  sql-data:
  resumes-data: